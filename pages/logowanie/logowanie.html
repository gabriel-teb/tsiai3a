<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom mody</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="logowanie.css">
     <script src="../../components/header/header.js" defer></script>
    <script src="../../components/footer/footer.js" defer></script>
</head>
<body>
    <dom-mody-header></dom-mody-header>
    <main>
        <section id="logowanie">
            <h1>Zaloguj się</h1>
            <form id="formularz">
                <div class="inputForm">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" placeholder="Wpisz swój email">
                </div>
                <div class="inputForm">
                    <label for="haslo">Hasło: </label>
                    <input type="password" id="haslo" required placeholder="Wpisz swoje hasło">
                </div>
                <div id="buttonSection">
                    <button id="btnAnuluj" onClick="window.location.href='index.html'">Anuluj</button>
                    <button id="btnSubmit" type="submit">Wyślij</button>
                </div>

            </form>
        </section>
    </main>
    <dom-mody-footer></dom-mody-footer>
</body>

</html>
