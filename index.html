<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom mody</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><h1>LOGO</h1></a>
        <nav>
            <ul>
                <li><a href="#">Strona główna</a></li>
                <li><a href="#">Mężczyzna</a></li>
                <li><a href="#">Kobieta</a></li>
                <li><a href="#">Dziecko</a></li>
            </ul>
        </nav>
        <section>
            <button onClick="window.location.href='logowanie.html'">Zaloguj</button>
            <button onClick="window.location.href='zarejestruj.html'">Zarejestruj</button>
        </section>
    </header>
    <main>
        <div id="container">
            <section class="product">
                <img src="./assets/nike.jpg" alt="Nike" width="150px" height="150px">
                <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                            <span class="marka">Nike</span>
                            <span class="model">Air Max 95</span>
                        </div>
                        <span class="cena">500 zł</span>
                    </div>
                     <div class="btn-container">
                        <button class="btn-kup">Kup teraz</button>
                    </div>
                </section>
            </section>
            <section class="product">
                <img src="./assets/adidas.jpg" alt="Adidas" width="150px" height="150px">
                   <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                            <span class="marka">Adidas</span>
                            <span class="model">Samba</span>
                        </div>
                        <span class="cena">450 zł</span>
                    </div>
                    <div class="btn-container">
                        <button class="btn-kup">Kup teraz</button>
                    </div>
                </section>
            </section>
            <section class="product">
                <img src="./assets/wolczanka.jpg" alt="Wólczanka" width="150px" height="150px">
                   <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                            <span class="marka">Wólczanka</span>
                            <span class="model">Biała koszula we wzorki</span>
                        </div>
                        <span class="cena">400 zł</span>
                    </div>
                     <div class="btn-container">
                        <button class="btn-kup">Kup teraz</button>
                    </div>
                </section>
            </section>
        </div>
     
    </main>
    <footer>
        <p>Wszelkie prawa zastrzeżone</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
